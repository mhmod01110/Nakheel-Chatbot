services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nakheel-app
    network_mode: host
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://127.0.0.1:27017
      QDRANT_HOST: 127.0.0.1
      QDRANT_PORT: 6333
      TEMP_DIR: /tmp/nakheel
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nakheel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  qdrant_data:
