services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nakheel-app
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://host.docker.internal:27017
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      TEMP_DIR: /app/tmp/nakheel
    ports:
      - "7000:7000"
    volumes:
      - ./tmp:/app/tmp
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: nakheel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
