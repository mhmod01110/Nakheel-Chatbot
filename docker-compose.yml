services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nakheel-app
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      TEMP_DIR: /app/tmp/nakheel
    ports:
      - "7000:7000"
    volumes:
      - ./tmp:/app/tmp
    depends_on:
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: nakheel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: nakheel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  mongo_data:
  qdrant_data:

